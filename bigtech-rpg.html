<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>大厂打工人的一周</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box; margin:0; padding:0}
    html,body{height:100%}
    body{
      font-family: "Noto Sans SC", -apple-system, sans-serif;
      background: #f0f2f5;
      color: #1a2332;
      overflow:hidden;
    }
    .app{
      display:flex;
      height:100vh;
      max-width:1200px;
      margin:0 auto;
    }

    /* === LEFT: Story Panel === */
    .story{
      flex:1.4;
      display:flex;
      flex-direction:column;
      padding:32px 36px;
      background:#fff;
      box-shadow:2px 0 24px rgba(0,0,0,.04);
      position:relative;
      overflow:hidden;
    }
    .day-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:20px;
      padding-bottom:16px;
      border-bottom:2px solid #eef1f6;
    }
    .day-title{
      font-size:22px;
      font-weight:700;
    }
    .day-title small{
      font-weight:400;
      font-size:14px;
      color:#6b7a8f;
      margin-left:8px;
    }
    .day-badge{
      background:#e8edf5;
      padding:4px 14px;
      border-radius:20px;
      font-size:13px;
      color:#4a5a72;
    }
    .event-area{
      flex:1;
      overflow-y:auto;
      margin:0 -12px;
      padding:0 12px;
    }
    .event-text{
      font-size:16px;
      line-height:1.8;
      color:#1a2332;
      white-space:pre-wrap;
      min-height:60px;
    }
    .event-text .highlight{
      color:#2b6ef0;
      font-weight:600;
    }
    .event-text .dim{
      color:#8896a8;
    }
    .event-text .danger{
      color:#e54545;
    }
    .event-text .success{
      color:#0e9f6e;
    }

    .choices{
      margin-top:24px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .choice-btn{
      display:block;
      width:100%;
      padding:14px 18px;
      border:1.5px solid #dce0e8;
      border-radius:12px;
      background:#fafbfc;
      text-align:left;
      font-size:14px;
      line-height:1.5;
      font-family:inherit;
      color:#1a2332;
      cursor:pointer;
      transition:all .15s;
    }
    .choice-btn:hover:not(:disabled){
      border-color:#2b6ef0;
      background:#f0f5ff;
      transform:translateX(4px);
    }
    .choice-btn:disabled{
      opacity:.5;
      cursor:default;
    }
    .choice-btn .effect{
      display:block;
      font-size:12px;
      color:#8896a8;
      margin-top:4px;
    }

    /* === RIGHT: Stats Panel === */
    .stats{
      width:280px;
      flex-shrink:0;
      padding:28px 24px;
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .stats-title{
      font-size:13px;
      font-weight:600;
      color:#6b7a8f;
      letter-spacing:2px;
      text-transform:uppercase;
      margin-bottom:8px;
    }
    .stat-row{
      margin-bottom:14px;
    }
    .stat-label{
      display:flex;
      justify-content:space-between;
      font-size:13px;
      font-weight:500;
      margin-bottom:4px;
    }
    .stat-bar{
      height:8px;
      border-radius:99px;
      background:#eef1f6;
      overflow:hidden;
    }
    .stat-bar-fill{
      height:100%;
      border-radius:99px;
      transition:width .4s cubic-bezier(.22,1,.36,1), background .3s;
    }
    .stat-val{
      font-size:13px;
      font-weight:600;
      min-width:24px;
      text-align:right;
    }
    .stat-val.danger{color:#e54545;}
    .stat-val.success{color:#0e9f6e;}

    .color-perf{background:#2b6ef0;}
    .color-mind{background:#0e9f6e;}
    .color-social{background:#f59e0b;}
    .color-energy{background:#8b5cf6;}

    .day-progress{
      margin-top:auto;
      padding-top:20px;
      border-top:2px solid #eef1f6;
    }
    .progress-dots{
      display:flex;
      gap:6px;
      margin-top:8px;
    }
    .dot{
      width:28px;
      height:28px;
      border-radius:50%;
      border:2px solid #dce0e8;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
      font-weight:600;
      color:#8896a8;
      background:#fff;
    }
    .dot.done{
      border-color:#2b6ef0;
      background:#2b6ef0;
      color:#fff;
    }
    .dot.active{
      border-color:#2b6ef0;
      background:#f0f5ff;
      color:#2b6ef0;
    }
    .dot.fail{
      border-color:#e54545;
      background:#e54545;
      color:#fff;
    }

    /* === Modals === */
    .modal-overlay{
      position:fixed;inset:0;
      background:rgba(0,0,0,.4);
      backdrop-filter:blur(4px);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:100;
    }
    .modal-overlay.hidden{display:none;}
    .modal-box{
      background:#fff;
      border-radius:20px;
      padding:36px 40px;
      max-width:460px;
      width:90%;
      text-align:center;
      box-shadow:0 24px 80px rgba(0,0,0,.15);
    }
    .modal-box h2{
      font-size:24px;
      margin-bottom:12px;
    }
    .modal-box p{
      font-size:15px;
      color:#4a5a72;
      line-height:1.6;
      margin-bottom:20px;
    }
    .modal-box .big-btn{
      display:inline-block;
      padding:12px 36px;
      background:#2b6ef0;
      color:#fff;
      border:none;
      border-radius:12px;
      font-size:15px;
      font-weight:600;
      font-family:inherit;
      cursor:pointer;
      transition:background .15s;
    }
    .modal-box .big-btn:hover{background:#1a5ad0;}

    .modal-box .ending-icon{
      font-size:48px;
      margin-bottom:12px;
    }
    .modal-box .stats-summary{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      text-align:left;
      margin:16px 0;
      padding:16px;
      background:#f8f9fb;
      border-radius:12px;
    }
    .modal-box .stats-summary div{
      font-size:13px;
      display:flex;
      justify-content:space-between;
    }

    .effect-feedback{
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      font-size:18px;
      font-weight:700;
      pointer-events:none;
      opacity:0;
      transition:opacity .25s, transform .4s cubic-bezier(.22,1,.36,1);
      z-index:50;
    }
    .effect-feedback.show{
      opacity:1;
      transform:translate(-50%,-70%);
    }

    .toast{
      position:fixed;
      bottom:32px;
      left:50%;
      transform:translateX(-50%) translateY(20px);
      background:rgba(0,0,0,.8);
      color:#fff;
      padding:10px 20px;
      border-radius:10px;
      font-size:13px;
      opacity:0;
      transition:all .25s;
      z-index:60;
      pointer-events:none;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    .typing-cursor::after{
      content:"▌";
      animation:blink .8s step-end infinite;
      color:#2b6ef0;
    }
    @keyframes blink{50%{opacity:0}}

    @media (max-width:780px){
      .app{flex-direction:column;height:auto;min-height:100vh;}
      .story{padding:20px;flex:none;}
      .stats{width:100%;padding:16px 20px;}
      .stats-title{display:none;}
      .progress-dots{flex-wrap:wrap;}
    }
  </style>
</head>
<body>
<div class="app" id="app">
  <!-- Story Panel -->
  <div class="story" id="storyPanel">
    <div class="day-header">
      <div>
        <div class="day-title" id="dayTitle">第 1 天 <small id="weekdayLabel">周一</small></div>
      </div>
      <div class="day-badge" id="phaseBadge">☕ 入职</div>
    </div>
    <div class="event-area" id="eventArea">
      <div class="event-text" id="eventText"></div>
      <div class="choices" id="choices"></div>
    </div>
  </div>

  <!-- Stats Panel -->
  <div class="stats" id="statsPanel">
    <div class="stats-title">📊 属性</div>
    <div class="stat-row">
      <div class="stat-label"><span>📋 绩效</span><span class="stat-val" id="valPerf">50</span></div>
      <div class="stat-bar"><div class="stat-bar-fill color-perf" id="barPerf" style="width:50%"></div></div>
    </div>
    <div class="stat-row">
      <div class="stat-label"><span>🧠 心态</span><span class="stat-val" id="valMind">50</span></div>
      <div class="stat-bar"><div class="stat-bar-fill color-mind" id="barMind" style="width:50%"></div></div>
    </div>
    <div class="stat-row">
      <div class="stat-label"><span>🤝 人缘</span><span class="stat-val" id="valSocial">50</span></div>
      <div class="stat-bar"><div class="stat-bar-fill color-social" id="barSocial" style="width:50%"></div></div>
    </div>
    <div class="stat-row">
      <div class="stat-label"><span>⚡ 精力</span><span class="stat-val" id="valEnergy">50</span></div>
      <div class="stat-bar"><div class="stat-bar-fill color-energy" id="barEnergy" style="width:50%"></div></div>
    </div>

    <div class="day-progress">
      <div style="font-size:13px;font-weight:600;color:#6b7a8f;">一周进度</div>
      <div class="progress-dots" id="progressDots"></div>
    </div>
  </div>
</div>

<!-- Effect feedback -->
<div class="effect-feedback" id="effectFeedback"></div>
<div class="toast" id="toast"></div>

<!-- Modal -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal-box" id="modalBox">
    <div class="ending-icon" id="endingIcon">🎉</div>
    <h2 id="modalTitle">第一周结束</h2>
    <div id="modalBody"></div>
    <button class="big-btn" id="modalBtn">重新开始</button>
  </div>
</div>

<script>
// ============================================================
// DATA
// ============================================================
const DAY_LABELS = ["周一","周二","周三","周四","周五","周六","周日"];

const STAT_EMOJI = { perf:"📋", mind:"🧠", social:"🤝", energy:"⚡" };
const STAT_CN = { perf:"绩效", mind:"心态", social:"人缘", energy:"精力" };
const STAT_COLOR = { perf:"#2b6ef0", mind:"#0e9f6e", social:"#f59e0b", energy:"#8b5cf6" };

// Events for each day. Each day has 1-2 events.
const EVENTS = [
  // Day 0 (周一) — 入职日
  [
    {
      text: '你背着双肩包，踩着新买的运动鞋，站在「字节跳动 · 方恒时尚中心」楼下。\n\n大厅里人来人往，工牌刷卡声滴滴响个不停。你深吸一口气——\n\n<dim>第一份大厂工作，今天开始了。</dim>',
      choices: [
        { text:"提前半小时到工位，熟悉环境", effects:{ perf:+8, mind:+3, social:+2, energy:-3 } },
        { text:"先和同时入职的新人打个招呼，加个微信", effects:{ perf:+2, mind:+5, social:+8, energy:-2 } },
        { text:"不急，先去楼下咖啡店买杯拿铁慢慢来", effects:{ perf:-3, mind:+8, social:+2, energy:+5 } },
      ]
    },
    {
      text: '你的 mentor <highlight>张哥</highlight> 走过来拍了拍你的肩膀。\n\n"来啦？我先带你转转，中午组里一起吃个饭。"\n\n他看起来挺靠谱。路过会议室时，你听见里面传来激烈的争吵声——\n\n"这个需求必须这周上！""你疯了吧？开发还没排期！"',
      choices: [
        { text:"默默记住「这个组节奏挺快」，以后注意", effects:{ perf:+5, mind:-2, social:+3, energy:-2 } },
        { text:"主动问张哥刚才吵的是什么项目，表示感兴趣", effects:{ perf:+5, mind:+2, social:+6, energy:-5 } },
        { text:"当没听见，先搞定领电脑和装环境", effects:{ perf:+3, mind:+2, social:-2, energy:+3 } },
      ]
    },
  ],
  // Day 1 (周二) — 第一个需求
  [
    {
      text: '飞书群里 @了你 — 产品经理 <highlight>小鹿</highlight> 发来一个需求文档链接。\n\n"这个需求比较急，周四前能出初版吗？"\n\n你点开文档，需求描述写得很模糊，交互图也没几张。\n\n你翻了翻评论区，已经有一个后端在下面吐槽了——\n\n<dim>"这方案没考虑边界情况，建议重写。"</dim>',
      choices: [
        { text:"直接约小鹿当面聊，对齐细节再动手", effects:{ perf:+8, mind:-2, social:+5, energy:-5 } },
        { text:"先按自己理解做一版，边做边确认", effects:{ perf:+5, mind:+3, social:-2, energy:-4 } },
        { text:"在评论区回复问题，推动产品先补充方案", effects:{ perf:+3, mind:+2, social:-3, energy:+2 } },
      ]
    },
    {
      text: '下午你被拉进一个跨部门会议。\n\n会议室里坐了十几号人，投影仪上放着——\n\n<highlight>「双月OKR对齐会 · 电商中台」</highlight>\n\n你坐在角落里，听着各个小组长轮流汇报。\n\n突然，你被点名了：\n\n"新来的同学也可以说说想法，不用紧张。"',
      choices: [
        { text:"硬着头皮说了几个自己对中台的理解", effects:{ perf:+6, mind:-5, social:+4, energy:-6 } },
        { text:"谦虚说还在熟悉，先听听大家的", effects:{ perf:+2, mind:+3, social:+6, energy:-2 } },
        { text:"把刚才听到的关键信息记下来，会后消化", effects:{ perf:+5, mind:+2, social:-1, energy:-3 } },
      ]
    },
  ],
  // Day 2 (周三) — 写代码
  [
    {
      text: '你正在调一个接口，花了两个小时还没跑通。\n\n本地日志刷了一屏又一屏，你盯着屏幕眼睛发酸。\n\n旁边的同事戴着耳机噼里啪啦敲键盘，节奏飞快。\n\n你瞟了一眼他的屏幕——他在写周报。\n\n<dim>对了，周报明天截止。</dim>',
      choices: [
        { text:"沉住气，打断同事问一下接口问题", effects:{ perf:+7, mind:+2, social:+3, energy:-4 } },
        { text:"自己再看一遍文档，硬啃下来", effects:{ perf:+5, mind:-3, social:-2, energy:-6 } },
        { text:"先换换脑子写周报，等会儿再回来调接口", effects:{ perf:-2, mind:+6, social:-1, energy:+3 } },
      ]
    },
    {
      text: '午休时，几个同事在公司楼下抽烟聊天。\n\n你路过时听到他们在聊——\n\n"听说了吗？搜索那边这波裁了 10%。"\n"正常，双月考核完了嘛。"\n"咱们组今年 HC 都冻结了。"\n\n你手里的咖啡突然没那么香了。',
      choices: [
        { text:"加入聊天，多了解些公司情况", effects:{ perf:-2, mind:-5, social:+7, energy:-2 } },
        { text:"当没听见，回去继续干活", effects:{ perf:+3, mind:-2, social:-3, energy:-3 } },
        { text:"提醒自己「专注成长，别被焦虑带节奏」", effects:{ perf:+4, mind:+5, social:-1, energy:+2 } },
      ]
    },
  ],
  // Day 3 (周四) — 1on1 & 截止日
  [
    {
      text: 'Leader <highlight>老曹</highlight> 约你做 1on1。\n\n他靠在椅子上，语气随意：\n\n"这周感觉怎么样？有没有什么不适应的？"\n\n你心里清楚——这是入职后第一次正式谈话，怎么说都有讲究。\n\n桌上放着他上次拿的 S 绩效奖杯，很晃眼。',
      choices: [
        { text:"实话实说：需求文档不清晰，希望流程能改进", effects:{ perf:+3, mind:+5, social:-3, energy:-2 } },
        { text:"说一切顺利，表示自己上手很快", effects:{ perf:+6, mind:-2, social:+3, energy:-1 } },
        { text:"借这个机会请教成长路径，表达进取心", effects:{ perf:+5, mind:+3, social:+6, energy:-3 } },
      ]
    },
    {
      text: '你正赶需求的 Deadline，产品小鹿又发来消息：\n\n<dim>"不好意思，需求有个调整……"</dim>\n\n她改了几个逻辑，意味着你上午写的代码要重来。\n\n你看了眼时间——<danger>下午 6 点</danger>，离截止还有 3 小时。',
      choices: [
        { text:"接受变更，高效调整，加班搞定", effects:{ perf:+10, mind:-5, social:+2, energy:-10 } },
        { text:"和小鹿沟通哪些改动可以下个迭代再做", effects:{ perf:+5, mind:+3, social:+4, energy:-3 } },
        { text:"嘴上答应，但只改关键部分，次要功能延后", effects:{ perf:-3, mind:+2, social:-4, energy:+2 } },
      ]
    },
  ],
  // Day 4 (周五) — 周报 & 周末
  [
    {
      text: '周报截止了。\n\n你打开共享文档，发现隔壁工位的同事已经写了两千字——\n\n<dim>"本周推进 3 个需求，协调 2 个跨团队依赖，梳理了 5 个历史遗留问题……"</dim>\n\n你的周报只有两行：\n\n<dim>"熟悉项目，修改了 2 个 bug。"</dim>',
      choices: [
        { text:"把这一周做的事情详细拆解，重新写一份", effects:{ perf:+8, mind:-3, social:-1, energy:-5 } },
        { text:"参考同事的周报风格，适当包装一下", effects:{ perf:+5, mind:+2, social:+3, energy:-2 } },
        { text:"周报而已，下周干出成绩再说", effects:{ perf:-5, mind:+4, social:-2, energy:+3 } },
      ]
    },
    {
      text: '周五下午四点，茶水间飘来了炸鸡味。\n\n有人在群里发消息：\n\n<dim>"下午茶到了，大家来吃！手工披萨 + 奶茶 + 炸鸡翅 🍕🧋"</dim>\n\n你工位上还剩一个 Bug 没修完。',
      choices: [
        { text:"先去吃，回来再修，劳逸结合", effects:{ perf:-2, mind:+8, social:+5, energy:+6 } },
        { text:"修完再去，不差这一会儿", effects:{ perf:+5, mind:-2, social:-2, energy:-3 } },
        { text:"拿一块披萨到工位边吃边修", effects:{ perf:+2, mind:+3, social:+2, energy:+2 } },
      ]
    },
  ],
  // Day 5 (周六) — 团建
  [
    {
      text: '周六早上，群里弹出消息——\n\n<dim>"团建通知：今天下午 2 点，朝阳公园飞盘 + 烧烤，全员参加 🥏🍖"</dim>\n\n你本来打算周末补觉的。\n\n群里已经有人开始接龙了，18 个人报了名。\n\n你纠结了。',
      choices: [
        { text:"去团建，和大家打成一片", effects:{ perf:+2, mind:+5, social:+8, energy:-5 } },
        { text:"去露个面，待一小时找借口溜", effects:{ perf:-1, mind:+3, social:+3, energy:+2 } },
        { text:"请假说不舒服，在家休息", effects:{ perf:-3, mind:+6, social:-6, energy:+8 } },
      ]
    },
  ],
  // Day 6 (周日) — 反思 & 下周
  [
    {
      text: '周日傍晚，你窝在出租屋的沙发上刷手机。\n\n一周就这样过去了。\n\n飞书群里安静了很多，只有几条 CI 通知和测试环境的告警。\n\n你回想这一周——\n\n被喷过、被拉进过莫名其妙的会议、写了代码又改掉、吃了三顿免费的晚餐。<dim>\n\n这就是大厂的日常。</dim>',
      choices: [
        { text:"打开电脑，提前看看下周的需求文档", effects:{ perf:+8, mind:-3, social:-1, energy:-5 } },
        { text:"写一篇周记，记录一周的收获和踩坑", effects:{ perf:+3, mind:+7, social:-1, energy:+2 } },
        { text:"彻底放空，打游戏看剧，不碰工作", effects:{ perf:-3, mind:+5, social:-1, energy:+8 } },
      ]
    },
  ],
];

// ============================================================
// STATE
// ============================================================
const S = {
  day: 0,       // 0-6
  event: 0,     // 0 or 1 within current day
  perf: 50,
  mind: 50,
  social: 50,
  energy: 50,
  done: false,
  finished: false,
};

const MAX_STAT=100, MIN_STAT=0;

// ============================================================
// DOM refs
// ============================================================
const $ = id=>document.getElementById(id);
const els = {
  dayTitle:$("dayTitle"),
  weekdayLabel:$("weekdayLabel"),
  phaseBadge:$("phaseBadge"),
  eventText:$("eventText"),
  choices:$("choices"),
  eventArea:$("eventArea"),
  // stats
  valPerf:$("valPerf"), barPerf:$("barPerf"),
  valMind:$("valMind"), barMind:$("barMind"),
  valSocial:$("valSocial"), barSocial:$("barSocial"),
  valEnergy:$("valEnergy"), barEnergy:$("barEnergy"),
  progressDots:$("progressDots"),
  // modal
  modalOverlay:$("modalOverlay"),
  modalBox:$("modalBox"),
  endingIcon:$("endingIcon"),
  modalTitle:$("modalTitle"),
  modalBody:$("modalBody"),
  modalBtn:$("modalBtn"),
  // feedback
  effectFeedback:$("effectFeedback"),
  toast:$("toast"),
};

// ============================================================
// HELPERS
// ============================================================
function clamp(v){return Math.max(MIN_STAT, Math.min(MAX_STAT, v))}

function rand(n){return Math.floor(Math.random()*n)}

function shuffle(a){for(let i=a.length-1;i>0;i--){let j=rand(i+1);[a[i],a[j]]=[a[j],a[i]]}return a}

function pick(arr){return arr[rand(arr.length)]}

// ============================================================
// RENDER
// ============================================================
function render(){
  // Day header
  const d = S.day;
  els.dayTitle.textContent = `第 ${d+1} 天`;
  els.weekdayLabel.textContent = DAY_LABELS[d];
  const phaseNames = ["入职","上手","磨合","较量","冲刺","团建","沉淀"];
  els.phaseBadge.textContent = `📌 ${phaseNames[d]}`;

  // Event
  const dayEvents = EVENTS[d];
  if(!dayEvents || S.event >= dayEvents.length){
    // Shouldn't happen normally
    advanceDay();
    return;
  }
  const ev = dayEvents[S.event];
  renderEvent(ev);

  // Stats
  updateStats();

  // Progress
  renderDots();
}

function renderEvent(ev){
  // Typing effect: show text first
  const textHtml = ev.text.replace(
    /<(\/?)highlight>/g,'<$1span style="color:#2b6ef0;font-weight:600">'
  ).replace(/<(\/?)dim>/g,'<$1span style="color:#8896a8">'
  ).replace(/<(\/?)danger>/g,'<$1span style="color:#e54545">'
  ).replace(/<(\/?)success>/g,'<$1span style="color:#0e9f6e">');

  els.eventText.innerHTML = textHtml;

  // Choices
  els.choices.innerHTML = "";
  ev.choices.forEach((c, i) => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    const effText = [];
    for(const [k,v] of Object.entries(c.effects)){
      if(v===0) continue;
      const em = STAT_EMOJI[k] || "";
      const cn = STAT_CN[k] || k;
      effText.push(`${v>0?"+":""}${v} ${em}${cn}`);
    }
    btn.innerHTML = `${c.text}<span class="effect">${effText.join(" · ")}</span>`;
    btn.addEventListener("click", ()=> choose(i));
    els.choices.appendChild(btn);
  });
}

function updateStats(){
  const setStat = (id, barId, val) => {
    const el = els[id];
    const bar = els[barId];
    el.textContent = val;
    bar.style.width = val + "%";
    el.className = "stat-val" + (val <= 20 ? " danger" : val >= 80 ? " success" : "");
  };
  setStat("valPerf","barPerf",S.perf);
  setStat("valMind","barMind",S.mind);
  setStat("valSocial","barSocial",S.social);
  setStat("valEnergy","barEnergy",S.energy);
}

function renderDots(){
  els.progressDots.innerHTML = "";
  for(let i=0;i<7;i++){
    const dot = document.createElement("div");
    dot.className = "dot";
    if(i < S.day) dot.classList.add("done");
    else if(i === S.day) dot.classList.add("active");
    if(S.finished && i === S.day) dot.classList.remove("active");
    dot.textContent = i+1;
    els.progressDots.appendChild(dot);
  }
}

// ============================================================
// GAME LOGIC
// ============================================================
function choose(idx){
  if(S.done) return;
  const ev = EVENTS[S.day][S.event];
  const c = ev.choices[idx];

  // Apply effects
  const eff = c.effects;
  if(eff.perf) S.perf = clamp(S.perf + eff.perf);
  if(eff.mind) S.mind = clamp(S.mind + eff.mind);
  if(eff.social) S.social = clamp(S.social + eff.social);
  if(eff.energy) S.energy = clamp(S.energy + eff.energy);

  updateStats();

  // Show effect feedback
  showEffectFeedback(eff);

  // Check endings
  const ending = checkEnding();
  if(ending){
    S.done = true;
    S.finished = true;
    disableChoices();
    setTimeout(()=> showEnding(ending), 600);
    return;
  }

  // Next event or day
  const dayEvents = EVENTS[S.day];
  if(S.event + 1 < dayEvents.length){
    S.event++;
    setTimeout(render, 300);
  } else {
    advanceDay();
  }
}

function advanceDay(){
  if(S.day >= 6){
    // Game complete!
    S.finished = true;
    S.done = true;
    disableChoices();
    setTimeout(()=> showEnding(null), 400);
    return;
  }
  S.day++;
  S.event = 0;
  render();
  // Scroll to top
  els.eventArea.scrollTop = 0;
}

function disableChoices(){
  els.choices.querySelectorAll(".choice-btn").forEach(b=>b.disabled=true);
}

function checkEnding(){
  if(S.perf <= 10) return { icon:"💀", title:"试用期被裁", msg:"Leader 找你谈了话：你的产出不达标，建议你主动提离职。\n\n你收拾工位的时候，发现入职时发的工牌还没捂热。" };
  if(S.mind <= 10) return { icon:"😶‍🌫️", title:"裸辞", msg:"你坐在出租屋里，盯着天花板发呆。\n\n打开银行 App 看了一眼余额，又关上了。\n\n第二天你提交了离职申请——世界那么大，你不想再写 CRUD 了。" };
  if(S.energy <= 10) return { icon:"🛌", title:"过劳", msg:"早上闹钟响了七遍，你起不来。\n\n身体像灌了铅一样沉重。你请了病假，在床上躺了一天。\n\n这个月第二次了。" };
  if(S.social <= 10) return { icon:"🧊", title:"被孤立", msg:"你发现群里聊天突然没有人 @ 你了。\n\n午饭时间，同事们结伴出去吃，没有人叫你。\n\n你在工位上默默拆了一包泡面。" };
  if(S.perf >= 95 && S.social >= 80) return { icon:"🏆", title:"嫡系养成", msg:"老曹在全员会上点名表扬了你。\n\n散会后他把你拉到一边：\n\n“下个双月有个重点项目，我打算让你来 lead。”\n\n你感受到了组织的温暖。" };
  return null;
}

function showEnding(ending){
  const overlay = els.modalOverlay;
  overlay.classList.remove("hidden");

  if(ending){
    els.endingIcon.textContent = ending.icon;
    els.modalTitle.textContent = ending.title;
    const body = document.createElement("div");
    body.innerHTML = ending.msg.replace(/\n/g,"<br>") + "<br><br>";
    // Show final stats
    const statsDiv = document.createElement("div");
    statsDiv.className = "stats-summary";
    statsDiv.innerHTML = `
      <div><span>📋 绩效</span><span>${S.perf}</span></div>
      <div><span>🧠 心态</span><span>${S.mind}</span></div>
      <div><span>🤝 人缘</span><span>${S.social}</span></div>
      <div><span>⚡ 精力</span><span>${S.energy}</span></div>
    `;
    body.appendChild(statsDiv);
    els.modalBody.innerHTML = "";
    els.modalBody.appendChild(body);
    els.modalBtn.textContent = "重新来过";
  } else {
    // Normal completion
    els.endingIcon.textContent = "🎉";
    els.modalTitle.textContent = "第一周，结束了";

    let evaluation = "";
    if(S.perf >= 80) evaluation += "<br>📋 绩效突出，老曹对你印象深刻。";
    else if(S.perf >= 50) evaluation += "<br>📋 绩效中等，还有上升空间。";
    else evaluation += "<br>📋 绩效偏低，需要加把劲。";

    if(S.mind >= 70) evaluation += "<br>🧠 心态很好，抗压能力强。";
    else if(S.mind >= 40) evaluation += "<br>🧠 心态还行，但别绷太紧。";
    else evaluation += "<br>🧠 心态堪忧，建议找个出口释放压力。";

    if(S.social >= 70) evaluation += "<br>🤝 人缘不错，大家都愿意帮你。";
    else if(S.social >= 40) evaluation += "<br>🤝 人际关系一般，多和同事聊聊。";
    else evaluation += "<br>🤝 有点孤立，试着主动一些。";

    if(S.energy >= 70) evaluation += "<br>⚡ 精力充沛，续航力满分。";
    else if(S.energy >= 40) evaluation += "<br>⚡ 精力一般，注意休息。";
    else evaluation += "<br>⚡ 精力透支，身体要紧。";

    const body = document.createElement("div");
    body.innerHTML = `你在大厂的第一周就这样过去了。${evaluation}<br><br>`;
    const statsDiv = document.createElement("div");
    statsDiv.className = "stats-summary";
    statsDiv.innerHTML = `
      <div><span>📋 绩效</span><span>${S.perf}</span></div>
      <div><span>🧠 心态</span><span>${S.mind}</span></div>
      <div><span>🤝 人缘</span><span>${S.social}</span></div>
      <div><span>⚡ 精力</span><span>${S.energy}</span></div>
    `;
    body.appendChild(statsDiv);
    body.innerHTML += `<br><span style="font-size:13px;color:#8896a8;">下周见 —— 如果还能撑到下周的话。</span>`;
    els.modalBody.innerHTML = "";
    els.modalBody.appendChild(body);
    els.modalBtn.textContent = "再来一周";
  }

  els.modalBtn.onclick = resetGame;
}

function resetGame(){
  S.day=0; S.event=0; S.perf=50; S.mind=50; S.social=50; S.energy=50;
  S.done=false; S.finished=false;
  els.modalOverlay.classList.add("hidden");
  render();
}

// ============================================================
// FX
// ============================================================
let _toastTimer;

function showEffectFeedback(eff){
  const parts = [];
  for(const [k,v] of Object.entries(eff)){
    if(v===0) continue;
    const sign = v > 0 ? "+" : "";
    const color = v > 0 ? "#0e9f6e" : "#e54545";
    parts.push(`<span style="color:${color}">${sign}${v} ${STAT_CN[k]}</span>`);
  }
  if(!parts.length) return;
  const fb = els.effectFeedback;
  fb.innerHTML = parts.join(" ");
  fb.classList.remove("show");
  void fb.offsetWidth;
  fb.classList.add("show");
  clearTimeout(fb._t);
  fb._t = setTimeout(()=> fb.classList.remove("show"), 1200);
}

function toast(msg){
  const t = els.toast;
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=> t.classList.remove("show"), 2000);
}

// ============================================================
// START
// ============================================================
render();
</script>
</body>
</html>
